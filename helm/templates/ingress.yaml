{{- if not (.Capabilities.APIVersions.Has "route.openshift.io/v1/Route") }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "orcha.fullname" . }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- .Values.ingress.annotations | toYaml | nindent 4}}
  {{- end }}
  labels:
    {{- include "orcha.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.class }}
  ingressClassName: {{ .Values.ingress.class }}
  {{- end }}
  tls:
    - hosts:
        - {{ include "orcha.hostname" $ }}
      secretName: {{ include "orcha.tlsSecretName" $ }}
  rules:
    - host: {{ include "orcha.hostname" $ }}
      http:
        paths:
          - path: /
            backend:
              service:
                name: {{ include "orcha.fullname" . }}-api
                port:
                  name: http
            pathType: Prefix
{{- end }}
{{- end }}