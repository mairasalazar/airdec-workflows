---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orcha.fullname" . }}-api
  labels:
    {{- include "orcha.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "orcha.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "orcha.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
      - name: api
        image: {{ include "orcha.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        envFrom:
          - configMapRef:
              name: {{ include "orcha.fullname" . }}
          - secretRef:
              name: {{ .Values.externalSecret.name }}
        env:
          {{- include "orcha.config.database" . | nindent 10 }}
          - name: TENANTS_FILE_PATH
            value: /etc/orcha/tenants.json
        volumeMounts:
          - name: tenants
            mountPath: /etc/orcha
            readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: tenants
          secret:
            secretName: orcha-tenants
            items:
              - key: tenants.json
                path: tenants.json